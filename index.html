<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Louie's SocMed</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

#bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
}

.card{
    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(10px);
    width:350px;
    padding:35px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
}

img{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #2a5298;
}

h1{
    margin-top:15px;
    color:#1e3c72;
}

p{
    margin:10px 0 25px;
    color:#555;
}

a{
    display:block;
    text-decoration:none;
    background:#2a5298;
    color:white;
    padding:15px;
    margin:12px 0;
    border-radius:12px;
    font-weight:500;
    transition:.3s;
}

a:hover{
    background:#163d74;
    transform:scale(1.03);
}

footer{
    margin-top:20px;
    font-size:12px;
    color:gray;
}

</style>

</head>
<body>

<video autoplay muted loop playsinline id="bg-video">
    <source src="beach.mp4" type="video/mp4">
</video>

<div class="card">

<img src="profile.jpg" alt="Profile Picture">

<h1>Louie Mart O. Navarro</h1>

<p>
Eto ang aking SocMed accounts, halina't kilalanin ako!<br>
</p>

<a href="https://www.tiktok.com/@naminayo" target="_blank">
🎵 TikTok
</a>

<a href="https://www.facebook.com/louie.mart" target="_blank">
📘 Facebook
</a>

<a href="https://www.instagram.com/louiefartt/" target="_blank">
📸 Instagram
</a>

<footer>
Salamat sa pagbisita!
</footer>

</div>

</body>
</html>
